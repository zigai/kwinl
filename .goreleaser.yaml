version: 2
project_name: kwinl

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: kwinl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

nfpms:
  - id: kwinl
    package_name: kwinl
    vendor: zigai
    homepage: https://github.com/zigai/kwinl
    maintainer: zigai
    description: Declarative window placement and layout launching for KWin
    license: GPL-3.0-only
    formats:
      - deb
      - rpm
    bindir: /usr/bin

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: desc
  abbrev: 7
  format: '[`{{ printf "%.7s" .SHA }}`](https://github.com/zigai/kwinl/commit/{{ .SHA }}) {{ .Message }}'
  groups:
    - title: Features
      regexp: '^.*?feat(\([^)]+\))?!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([^)]+\))?!?:.+$'
      order: 1
    - title: Other Changes
      order: 999
  filters:
    exclude:
      - '^docs(\([^)]+\))?!?:'
      - '^test(\([^)]+\))?!?:'
      - '^ci(\([^)]+\))?!?:'
      - '^chore(\([^)]+\))?!?:'

release:
  github:
    owner: zigai
    name: kwinl
  draft: false
  prerelease: auto
